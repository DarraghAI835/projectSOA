<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOA PROJECT A00314039</title>
</head>
<body>
	<h1>SOA 4 Conditional GET PROJECT</h1>
	<div class="row">
		<div class="column">
			<h3>Cars Table</h3>
			<table id="carsTable">
			
			</table>
			<h3>Specific Car Details</h3>
			<p>Select a car to see the car+garage details</p>
			<p id="carDetails">
			</p>
		</div>
		<div class="column"></div>
	</div>
	<button id="btn1">get all</button>

	<p id="infoHere"></p>
	<script>
		const btn1 =document.getElementById("btn1");
		const infoHere =document.getElementById("infoHere");
		const carsTable =document.getElementById("carsTable");
		const carDetails = document.getElementById("carDetails");
		
		btn1.addEventListener("click",()=>{
			infoHere.innerHTML="";
			fetch("http://localhost:8080/cars")
			.then(response => response.json())
			.then(data=>{
				console.log(data);
				infoHere.innerHTML =data.map(car=>`<div>${car.name}-${car.model}</div>`).join("");
			});
		});
		
		
		document.addEventListener("DOMContentLoaded", function () {
			carsTable.innerHTML = "<tr><td>carId</td><td>make</td><td>model</td><td>age</td><td>colour</td><td>garageId</td></tr>";
			fetch("http://localhost:8080/cars")
				.then(response => response.json())
				.then(data=>{
					console.log(data);
					.innerHTML =data.map(car=>`<tr><td><button class="selectCarButton">${car.carId}</button></td><td>${car.make}</td><td>${car.model}</td><td>${car.age}</td><td>${car.colour}</td><td>${car.garageId}</td></tr>`).join("");
				});
			document.querySelectorAll(".selectCarButton").forEach(function(elem){
				elem.addEventLister("click",function(){
					carDetails.innerHTML="";
					fetch("http://localhost:8080/cars")
					.then(response => response.json())
					.then(data=>{
						console.log(data);
						carDetails.innerHTML =data.map(car=>`<div>${car.name}-${car.model}</div>`).join("");
					});
				});	
			});
		});
		
		
		"carId": 6,
	    "make": "Ford",
	    "model": "Fiesta",
	    "age": 2012,
	    "colour": "Gray",
	    "garageId": 3

	</script>
</body>
</html>
