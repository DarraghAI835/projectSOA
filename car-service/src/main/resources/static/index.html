<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOA PROJECT A00314039</title>
</head>
<body>
	<h1>SOA 4 Conditional GET PROJECT</h1>
	<div class="row">
		<div class="column">
			<h3>Cars Table</h3>
			<table id="carsTable">
			
			</table>
			<h3>Specific Car Details</h3>
			<p>Select a car to see the car+garage details</p>
			<p id="carDetails">
			</p>
		</div>
		<div class="column">
			<button id="btn1">Refresh Cars</button>
			<p id="status"></p>
			<p id="Etag"></p>
		
		</div>
	</div>
	

	<p id="infoHere"></p>
	<script>
		const btn1 =document.getElementById("btn1");
		const infoHere =document.getElementById("infoHere");
		const carsTable =document.getElementById("carsTable");
		const carDetails = document.getElementById("carDetails");
		const Etag =document.getElementById("Etag");
		const status=document.getElementById("status");
		
		btn1.addEventListener("click",()=>{
			refreshCarsTable();
		});
		
		
		document.addEventListener("DOMContentLoaded", function () {
			refreshCarsTable();
		});
		function refreshCarsTable(){
			Etag.innerHTML="";
			fetch("http://localhost:8080/cars")
				.then(response => {
					const etagHeader =response.headers.get("ETag");
					Etag.innerHTML=`Etag: ${etagHeader}`;
					if(response.status === 304){
						status.innerHTML="304";
						return [];
					}
					status.innerHTML=response.status;
					return response.json();
				})
				.then(data=>{
					if (!data||data.length===0) return;
					
					carsTable.innerHTML = "<tr><td>carId</td><td>make</td><td>model</td><td>age</td><td>colour</td><td>garageId</td></tr>";
					
					console.log(data);
					carsTable.innerHTML =carsTable.innerHTML+data.map(car=>`<tr><td><button class="selectCarButton">${car.carId}</button></td><td>${car.make}</td><td>${car.model}</td><td>${car.age}</td><td>${car.colour}</td><td>${car.dealershipId}</td></tr>`).join("");
					document.querySelectorAll(".selectCarButton").forEach(function(elem){
						elem.addEventListener("click",function(){
							carDetails.innerHTML="";
							const carId = this.textContent;
							fetch("http://localhost:8080/cars/"+carId)
							.then(response => response.json())
							.then(data=>{
								console.log(data);
								carDetails.innerHTML =`<div>Car ID: ${data.carId}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Car Make: ${data.make}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Car Model: ${data.model}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Car Age: ${data.age}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Car Colour: ${data.colour}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Dealership ID: ${data.dealershipId.dealershipId}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Dealership Name: ${data.dealershipId.name}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Dealership Address: ${data.dealershipId.address}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Dealership County: ${data.dealershipId.county}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Dealership Phone: ${data.dealershipId.phone}</div>`;
								carDetails.innerHTML =carDetails.innerHTML+`<div>Dealership Owner: ${data.dealershipId.owner}</div>`;
							});
						});	
					});
				});
		}
	</script>
</body>
</html>
